spring:
  application:
    name: adas-retrofit
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:adas}
    username: ${DB_USER:adas}
    password: ${DB_PASSWORD:adas}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 60MB

server:
  port: 8080

# Объектное хранилище фотофиксации повреждений
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:adas-photos}

camunda:
  bpm:
    # не перехватывать корень '/', чтобы там отдавался наш пульт (static/index.html)
    webapp:
      index-redirect-enabled: false
    admin-user:
      id: ${CAMUNDA_ADMIN_USER:admin}
      password: ${CAMUNDA_ADMIN_PASSWORD:admin}
    filter:
      create: "All tasks"
    database:
      schema-update: true
    # авто-деплой BPMN из classpath (src/main/resources/bpmn/*.bpmn)
    deployment-resource-pattern: "classpath*:**/*.bpmn"

# Почтовые оповещения о назначении user task.
# SMTP-хост намеренно не задан здесь: без переменной окружения SPRING_MAIL_HOST
# (docker compose ставит её = mailpit) Spring не создаёт JavaMailSender, и оповещения
# просто отключаются — удобно для тестов и локального запуска без почтового сервера.
notifications:
  # адрес отправителя
  from: ${NOTIFY_FROM:no-reply@adas.local}
  # домен, к которому приклеивается имя роли: ENGINEER -> engineer@adas.local
  recipient-domain: ${NOTIFY_DOMAIN:adas.local}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.adas.retrofit: DEBUG