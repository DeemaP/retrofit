spring:
  datasource:
    url: jdbc:h2:mem:adas;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

camunda:
  bpm:
    admin-user:
      id: admin
      password: admin
    database:
      schema-update: true
    deployment-resource-pattern: "classpath*:**/*.bpmn"

logging:
  level:
    com.adas.retrofit: DEBUG